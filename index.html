<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز شاليه</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:Arial,Tahoma,sans-serif;background:#f2f5f4;color:#17231f}
.wrapper{min-height:100vh;padding:18px;background:linear-gradient(180deg,#0b6b55,#f2f5f4 42%)}
.card{max-width:480px;margin:auto;background:#fff;border-radius:24px;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.18)}
h1{margin:0 0 6px;color:#0b6b55;font-size:26px;text-align:center}
.subtitle{margin:0 0 22px;text-align:center;color:#66726e;font-size:14px;line-height:1.7}
.field{margin-bottom:15px}
label{display:block;font-size:14px;font-weight:800;margin-bottom:7px}
input,select,textarea{width:100%;border:1px solid #d8e2df;background:#f9fbfa;border-radius:14px;padding:14px;font-size:15px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#0b6b55;box-shadow:0 0 0 3px rgba(11,107,85,.12)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.serviceDropdown{position:relative}
.serviceBtn{width:100%;border:1px solid #d8e2df;background:#f9fbfa;border-radius:14px;padding:14px;font-size:15px;text-align:right;color:#17231f;cursor:pointer}
.serviceList{display:none;margin-top:8px;background:#fff;border:1px solid #d8e2df;border-radius:14px;max-height:260px;overflow:auto;padding:8px}
.serviceList.show{display:block}
.serviceItem{display:flex;justify-content:space-between;align-items:center;background:#f3f7f5;border:1px solid #dce7e3;border-radius:12px;padding:11px;margin-bottom:8px;font-size:14px;font-weight:700}
.serviceItem input{width:auto}
.notice{background:#fff7df;color:#715000;border:1px solid #efd28a;border-radius:15px;padding:13px;font-size:13px;line-height:1.8;margin:18px 0}
button{width:100%;border:0;border-radius:16px;padding:15px;background:linear-gradient(135deg,#11946d,#075843);color:#fff;font-size:17px;font-weight:900;cursor:pointer}
.success{display:none;margin-top:15px;padding:14px;border-radius:15px;background:#e8fff4;color:#087047;border:1px solid #a8ebce;text-align:center;font-weight:900}
.reviewBox{display:none;margin-top:18px;background:#f8fbfa;border:1px solid #d8e2df;border-radius:20px;padding:16px}
.reviewBox h2{margin:0 0 14px;color:#0b6b55;font-size:20px;text-align:center}
.reviewItem{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #e1e9e6;font-size:14px}
.reviewItem:last-child{border-bottom:0}
.reviewItem span{color:#66726e;font-weight:800}
.reviewItem strong{color:#17231f;text-align:left;line-height:1.7}
.reviewActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.editBtn{background:#e8efec;color:#17231f}
.confirmBtn{background:linear-gradient(135deg,#11946d,#075843)}
.sendingText{display:none;margin-top:12px;text-align:center;color:#0b6b55;font-size:13px;font-weight:800}
@media(max-width:480px){
  .wrapper{padding:14px}
  .card{padding:18px;border-radius:22px}
  .row,.reviewActions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <h1>حجز شاليه</h1>
    <p class="subtitle">يرجى تعبئة بيانات الحجز وسيتم التواصل معك لتأكيد الطلب.</p>

    <form id="bookingForm">

      <div class="field">
        <label>اسم صاحب الحجز</label>
        <input type="text" id="name" required>
      </div>

      <div class="field">
        <label>رقم الجوال</label>
        <input type="tel" id="phone" maxlength="10" required>
      </div>

      <div class="row">
        <div class="field">
          <label>تاريخ ووقت الدخول</label>
          <input type="datetime-local" id="checkin" required>
        </div>

        <div class="field">
          <label>تاريخ ووقت الخروج</label>
          <input type="datetime-local" id="checkout" required>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>عدد الأشخاص</label>
          <input type="number" id="people" min="1" required>
        </div>

        <div class="field">
          <label>نوع القسم</label>
          <select id="sectionType" required>
            <option value="">اختر القسم</option>
            <option>قسم رجال</option>
            <option>قسم نساء</option>
            <option>قسم عائلات</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>الخدمات الإضافية</label>

        <div class="serviceDropdown">
          <button type="button" class="serviceBtn" id="serviceBtn">اختر الخدمات الإضافية</button>

          <div class="serviceList" id="serviceList">
            <label class="serviceItem"><span>مسبح دافئ</span><input type="checkbox" name="services" value="مسبح دافئ"></label>
            <label class="serviceItem"><span>مسبح أطفال</span><input type="checkbox" name="services" value="مسبح أطفال"></label>
            <label class="serviceItem"><span>ألعاب أطفال</span><input type="checkbox" name="services" value="ألعاب أطفال"></label>
            <label class="serviceItem"><span>زحليقة مائية</span><input type="checkbox" name="services" value="زحليقة مائية"></label>
            <label class="serviceItem"><span>ملعب كرة قدم</span><input type="checkbox" name="services" value="ملعب كرة قدم"></label>
            <label class="serviceItem"><span>ملعب طائرة</span><input type="checkbox" name="services" value="ملعب طائرة"></label>
            <label class="serviceItem"><span>جلسة خارجية</span><input type="checkbox" name="services" value="جلسة خارجية"></label>
            <label class="serviceItem"><span>جلسة شعبية</span><input type="checkbox" name="services" value="جلسة شعبية"></label>
            <label class="serviceItem"><span>مجلس رجال</span><input type="checkbox" name="services" value="مجلس رجال"></label>
            <label class="serviceItem"><span>مجلس نساء</span><input type="checkbox" name="services" value="مجلس نساء"></label>
            <label class="serviceItem"><span>صالة عائلية</span><input type="checkbox" name="services" value="صالة عائلية"></label>
            <label class="serviceItem"><span>منطقة شواء</span><input type="checkbox" name="services" value="منطقة شواء"></label>
            <label class="serviceItem"><span>مطبخ مجهز</span><input type="checkbox" name="services" value="مطبخ مجهز"></label>
            <label class="serviceItem"><span>ثلاجة إضافية</span><input type="checkbox" name="services" value="ثلاجة إضافية"></label>
            <label class="serviceItem"><span>تجهيز مناسبة</span><input type="checkbox" name="services" value="تجهيز مناسبة"></label>
            <label class="serviceItem"><span>بوفيه وضيافة</span><input type="checkbox" name="services" value="بوفيه وضيافة"></label>
            <label class="serviceItem"><span>مكبرات صوت</span><input type="checkbox" name="services" value="مكبرات صوت"></label>
            <label class="serviceItem"><span>إضاءة خارجية</span><input type="checkbox" name="services" value="إضاءة خارجية"></label>
            <label class="serviceItem"><span>تنظيف إضافي</span><input type="checkbox" name="services" value="تنظيف إضافي"></label>
            <label class="serviceItem"><span>دخول مبكر</span><input type="checkbox" name="services" value="دخول مبكر"></label>
            <label class="serviceItem"><span>خروج متأخر</span><input type="checkbox" name="services" value="خروج متأخر"></label>
          </div>
        </div>
      </div>

      <div class="field">
        <label>ملاحظات إضافية</label>
        <textarea id="notes" rows="4"></textarea>
      </div>

      <div class="notice">
        ملاحظة: لا يتم تأكيد الحجز إلا بعد التواصل معك ودفع قيمة الحجز أو العربون المطلوب.
      </div>

      <button type="submit">إرسال طلب الحجز</button>

      <div class="reviewBox" id="reviewBox">
        <h2>مراجعة بيانات الحجز</h2>

        <div class="reviewItem"><span>الاسم</span><strong id="rName"></strong></div>
        <div class="reviewItem"><span>رقم الجوال</span><strong id="rPhone"></strong></div>
        <div class="reviewItem"><span>الدخول</span><strong id="rCheckin"></strong></div>
        <div class="reviewItem"><span>الخروج</span><strong id="rCheckout"></strong></div>
        <div class="reviewItem"><span>عدد الأشخاص</span><strong id="rPeople"></strong></div>
        <div class="reviewItem"><span>نوع القسم</span><strong id="rSection"></strong></div>
        <div class="reviewItem"><span>الخدمات</span><strong id="rServices"></strong></div>
        <div class="reviewItem"><span>الملاحظات</span><strong id="rNotes"></strong></div>

        <div class="reviewActions" id="reviewActions">
          <button type="button" class="editBtn" id="editBtn">تعديل البيانات</button>
          <button type="button" class="confirmBtn" id="confirmBtn">تأكيد الإرسال</button>
        </div>

        <div class="sendingText" id="sendingText">جاري إرسال الطلب...</div>
      </div>

      <div class="success" id="successMsg">
        تم إرسال طلب الحجز بنجاح
      </div>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const WORKER_URL = "ضع_رابط_WORKER_هنا";

const form = document.getElementById("bookingForm");
const phone = document.getElementById("phone");
const checkin = document.getElementById("checkin");
const checkout = document.getElementById("checkout");
const people = document.getElementById("people");
const sectionType = document.getElementById("sectionType");
const notes = document.getElementById("notes");

const successMsg = document.getElementById("successMsg");
const serviceBtn = document.getElementById("serviceBtn");
const serviceList = document.getElementById("serviceList");
const serviceChecks = document.querySelectorAll('input[name="services"]');

const reviewBox = document.getElementById("reviewBox");
const editBtn = document.getElementById("editBtn");
const confirmBtn = document.getElementById("confirmBtn");
const reviewActions = document.getElementById("reviewActions");
const sendingText = document.getElementById("sendingText");

serviceBtn.onclick = () => {
  serviceList.classList.toggle("show");
};

serviceChecks.forEach(item=>{
  item.addEventListener("change",()=>{
    const selected = Array.from(serviceChecks)
      .filter(i => i.checked)
      .map(i => i.value);

    serviceBtn.textContent = selected.length
      ? "تم اختيار " + selected.length + " خدمة"
      : "اختر الخدمات الإضافية";
  });
});

phone.oninput = () => {
  phone.value = phone.value.replace(/\D/g,'').slice(0,10);
};

checkin.onchange = () => {
  checkout.min = checkin.value;
};

function formatDateTime(value){
  if(!value) return "";
  const d = new Date(value);
  return d.toLocaleString("ar-SA", {
    year:"numeric",
    month:"long",
    day:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

form.onsubmit = (e) => {
  e.preventDefault();

  if(phone.value.length !== 10){
    alert("يرجى إدخال رقم جوال صحيح");
    return;
  }

  if(checkout.value && checkin.value && checkout.value <= checkin.value){
    alert("تاريخ ووقت الخروج يجب أن يكون بعد تاريخ ووقت الدخول");
    return;
  }

  const selectedServices = Array.from(serviceChecks)
    .filter(i => i.checked)
    .map(i => i.value);

  document.getElementById("rName").textContent = document.getElementById("name").value;
  document.getElementById("rPhone").textContent = phone.value;
  document.getElementById("rCheckin").textContent = formatDateTime(checkin.value);
  document.getElementById("rCheckout").textContent = formatDateTime(checkout.value);
  document.getElementById("rPeople").textContent = people.value;
  document.getElementById("rSection").textContent = sectionType.value;
  document.getElementById("rServices").textContent = selectedServices.length ? selectedServices.join("، ") : "لا توجد خدمات إضافية";
  document.getElementById("rNotes").textContent = notes.value || "لا توجد ملاحظات";

  reviewBox.style.display = "block";
  successMsg.style.display = "none";
  reviewActions.style.display = "grid";
  sendingText.style.display = "none";
  reviewBox.scrollIntoView({behavior:"smooth", block:"center"});
};

editBtn.onclick = () => {
  reviewBox.style.display = "none";
};

confirmBtn.onclick = async () => {
  if(WORKER_URL === "ضع_رابط_WORKER_هنا"){
    alert("ضع رابط العامل WORKER داخل المتغير WORKER_URL أولاً");
    return;
  }

  confirmBtn.disabled = true;
  editBtn.disabled = true;
  sendingText.style.display = "block";

  try{
    reviewActions.style.display = "none";

    const canvas = await html2canvas(reviewBox, {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true
    });

    canvas.toBlob(async (blob) => {
      const formData = new FormData();
      formData.append("photo", blob, "booking-review.png");

      const response = await fetch(WORKER_URL, {
        method: "POST",
        body: formData
      });

      if(!response.ok){
        throw new Error("send failed");
      }

      reviewBox.style.display = "none";
      successMsg.style.display = "block";
      successMsg.scrollIntoView({behavior:"smooth", block:"center"});

      confirmBtn.disabled = false;
      editBtn.disabled = false;
      reviewActions.style.display = "grid";
      sendingText.style.display = "none";

    }, "image/png");

  }catch(error){
    alert("تعذر إرسال الطلب، تأكد من رابط العامل وحاول مرة أخرى");
    confirmBtn.disabled = false;
    editBtn.disabled = false;
    reviewActions.style.display = "grid";
    sendingText.style.display = "none";
  }
};
</script>

</body>
  </html>
