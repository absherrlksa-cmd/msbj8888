<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوابة دفع</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:#f3f3f3;
  font-family:Arial, sans-serif;
  color:#111;
}

.page{
  width:100%;
  max-width:380px;
  margin:0 auto;
  padding:20px 14px;
}

.amount-title{
  text-align:center;
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.amount-value{
  text-align:center;
  font-size:32px;
  font-weight:900;
  direction:ltr;
  margin-bottom:32px;
  min-height:38px;
}

.divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:32px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  max-width:70px;
  height:2px;
  background:#cecece;
}

.divider span{
  font-size:22px;
  font-weight:700;
}

.field-group{
  margin-bottom:22px;
}

.label{
  display:block;
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.input{
  width:100%;
  height:64px;
  border:2px solid #cfcfcf;
  border-radius:16px;
  background:#f7f7f7;
  font-size:18px;
  padding:0 14px;
  outline:none;
}

.input.error{
  border-color:#d93025 !important;
  box-shadow:0 0 0 3px rgba(217,48,37,0.10);
  background:#fff7f7;
}

.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.card-logo-top{
  width:130px;
  height:37px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  user-select:none;
  -webkit-user-select:none;
}

.card-logo-top img{
  height:37px;
  width:auto;
  object-fit:contain;
  transform: translateY(-4px);
  background:none;
  border:none;
  box-shadow:none;
  -webkit-user-drag:none;
  user-drag:none;
  pointer-events:none;
}

.card-number{
  direction:ltr;
  text-align:left;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.col{
  flex:1;
}

.pay-btn{
  width:100%;
  height:64px;
  margin-top:16px;
  border:none;
  border-radius:16px;
  background:#2ac769;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

/* ✅ صار مثل شكل حقل CVV */
.expiry-wrap{
  width:100%;
  height:64px;
  background:#f7f7f7;
  border:2px solid #cfcfcf;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  direction:ltr;
}

.expiry-wrap.error{
  border-color:#d93025 !important;
  box-shadow:0 0 0 3px rgba(217,48,37,0.10);
  background:#fff7f7;
}

.expiry-select{
  width:38%;
  height:100%;
  border:none;
  background:transparent;
  font-size:18px;
  outline:none;
  text-align:center;
  text-align-last:center;
  direction:ltr;
  color:#9a9a9a;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

.expiry-select.has-value{
  color:#111;
}

.expiry-separator{
  width:24%;
  text-align:center;
  font-size:24px;
  font-weight:700;
  color:#777;
  user-select:none;
  -webkit-user-select:none;
}

::placeholder{
  color:#9a9a9a;
}
</style>
</head>

<body>

<div class="page">

  <div class="amount-title">المبلغ</div>
  <div class="amount-value" id="topAmount"></div>

  <div class="divider">
    <span>ادفع عن طريق البطاقة</span>
  </div>

  <div class="field-group">
    <label class="label">اسم حامل البطاقة</label>
    <input
      class="input"
      id="cardHolder"
      placeholder="اسم حامل البطاقة"
      inputmode="text"
      autocomplete="cc-name"
      maxlength="40"
    >
  </div>

  <div class="field-group">

    <div class="card-head">
      <label class="label">معلومات البطاقة</label>

      <div class="card-logo-top"
           oncontextmenu="return false"
           ondragstart="return false"
           onselectstart="return false">
        <img
          src="https://i.postimg.cc/VN2hJkfC/20260417-191748.png"
          alt="Card Logo"
          draggable="false"
          oncontextmenu="return false"
          ondragstart="return false"
        >
      </div>
    </div>

    <input
      class="input card-number"
      id="cardNumber"
      placeholder="0000 0000 0000 0000"
      inputmode="numeric"
      maxlength="19"
      autocomplete="cc-number"
    >

    <div class="row">
      <div class="col">
        <input
          class="input"
          id="cvv"
          placeholder="CVV"
          inputmode="numeric"
          maxlength="3"
          autocomplete="cc-csc"
        >
      </div>

      <div class="col">
        <div class="expiry-wrap" id="expiryWrap">
          <select id="expMonth" class="expiry-select">
            <option value="">MM</option>
          </select>

          <div class="expiry-separator">/</div>

          <select id="expYear" class="expiry-select">
            <option value="">YY</option>
          </select>
        </div>
      </div>
    </div>

  </div>

  <button class="pay-btn" id="payBtn"></button>

</div>

<script>
const API_URL = "https://snowy-bread-61bc.aefoon2030.workers.dev/";

function normalizeAmount(value) {
  if (!value || typeof value !== "string") return null;
  return value.trim();
}

function setAmount(amount) {
  const finalAmount = normalizeAmount(amount);
  if (!finalAmount) return;

  document.getElementById("topAmount").textContent = finalAmount;
  document.getElementById("payBtn").textContent = "ادفع " + finalAmount;
}

async function loadAmount() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now(), {
      cache: "no-store"
    });

    const data = await res.json();

    if (data && data.ok && data.amount) {
      setAmount(data.amount);
    }
  } catch (e) {
    console.log("تعذر تحميل المبلغ", e);
  }
}

loadAmount();
setInterval(loadAmount, 3000);

/* اسم حامل البطاقة */
const cardHolder = document.getElementById("cardHolder");

cardHolder.addEventListener("input", function () {
  this.value = this.value.replace(/[^A-Za-z ]/g, "");
});

cardHolder.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = text.replace(/[^A-Za-z ]/g, "");
  document.execCommand("insertText", false, cleaned);
});

/* رقم البطاقة */
const cardNumber = document.getElementById("cardNumber");

cardNumber.addEventListener("input", function () {
  let digits = this.value.replace(/\D/g, "").slice(0, 16);
  this.value = digits.replace(/(\d{4})(?=\d)/g, "$1 ").trim();
  validateCardNumber();
});

cardNumber.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  let digits = text.replace(/\D/g, "").slice(0, 16);
  this.value = digits.replace(/(\d{4})(?=\d)/g, "$1 ").trim();
  validateCardNumber();
});

function validateCardNumber() {
  const digits = cardNumber.value.replace(/\D/g, "");
  if (digits.length === 0 || digits.length === 16) {
    cardNumber.classList.remove("error");
    return true;
  }
  cardNumber.classList.add("error");
  return false;
}

/* CVV */
const cvv = document.getElementById("cvv");

cvv.addEventListener("input", function () {
  this.value = this.value.replace(/\D/g, "").slice(0, 3);
  validateCVV();
});

cvv.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  this.value = text.replace(/\D/g, "").slice(0, 3);
  validateCVV();
});

function validateCVV() {
  if (cvv.value.length === 0 || cvv.value.length === 3) {
    cvv.classList.remove("error");
    return true;
  }
  cvv.classList.add("error");
  return false;
}

/* تاريخ الانتهاء */
const expMonth = document.getElementById("expMonth");
const expYear = document.getElementById("expYear");
const expiryWrap = document.getElementById("expiryWrap");

for (let i = 1; i <= 12; i++) {
  const option = document.createElement("option");
  option.value = String(i).padStart(2, "0");
  option.textContent = String(i).padStart(2, "0");
  expMonth.appendChild(option);
}

for (let y = 26; y <= 50; y++) {
  const option = document.createElement("option");
  option.value = String(y);
  option.textContent = String(y);
  expYear.appendChild(option);
}

[expMonth, expYear].forEach(select => {
  select.addEventListener("paste", function (e) {
    e.preventDefault();
  });
});

function validateExpiry() {
  const valid = expMonth.value !== "" && expYear.value !== "";

  if (valid || (expMonth.value === "" && expYear.value === "")) {
    expiryWrap.classList.remove("error");
  } else {
    expiryWrap.classList.add("error");
  }

  expMonth.classList.toggle("has-value", expMonth.value !== "");
  expYear.classList.toggle("has-value", expYear.value !== "");

  return valid;
}

expMonth.addEventListener("change", validateExpiry);
expYear.addEventListener("change", validateExpiry);

/* منع تنزيل/سحب/تحديد الشعار */
document.addEventListener("contextmenu", function (e) {
  if (e.target.closest(".card-logo-top")) {
    e.preventDefault();
  }
});

document.addEventListener("dragstart", function (e) {
  if (e.target.closest(".card-logo-top")) {
    e.preventDefault();
  }
});

document.addEventListener("selectstart", function (e) {
  if (e.target.closest(".card-logo-top")) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
