<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوابة دفع</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:#f3f3f3;
  font-family:Arial, sans-serif;
  color:#111;
}

body{
  min-height:100vh;
}

.page{
  width:100%;
  max-width:420px;
  margin:0 auto;
  padding:24px 18px 28px;
}

.amount-title{
  text-align:center;
  font-size:18px;
  font-weight:700;
  margin-bottom:14px;
  color:#333;
}

.amount-value{
  text-align:center;
  font-size:38px;
  font-weight:700;
  direction:ltr;
  margin-bottom:42px;
  color:#2f2f33;
}

.divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-bottom:42px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  max-width:90px;
  height:2px;
  background:#cecece;
  border-radius:2px;
}

.divider span{
  font-size:26px;
  font-weight:700;
  color:#333;
  white-space:nowrap;
}

.field-group{
  margin-bottom:28px;
}

.label{
  display:block;
  font-size:24px;
  font-weight:700;
  margin-bottom:14px;
  color:#111;
}

.input{
  width:100%;
  height:74px;
  border:3px solid #cfcfcf;
  border-radius:18px;
  background:#f7f7f7;
  font-size:22px;
  color:#111;
  padding:0 18px;
  outline:none;
  box-shadow:none;
}

.input::placeholder{
  color:#b8b8b8;
}

.input:focus{
  border-color:#cfcfcf;
  background:#fafafa;
  outline:none;
  box-shadow:none;
}

.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.card-head .label{
  margin:0;
}

/* 🔥 الشعار فقط مكبر */
.card-logo-top{
  width:120px;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  overflow:hidden;
}

.card-logo-top img{
  height:24px;
  width:auto;
  max-width:100%;
  object-fit:contain;
  background:none !important;
  border:none !important;
  box-shadow:none !important;
}

.card-number{
  direction:ltr;
  text-align:left;
}

.row{
  display:flex;
  gap:14px;
  margin-top:14px;
}

.col{
  flex:1;
}

.small-input{
  text-align:center;
  direction:ltr;
}

.pay-btn{
  width:100%;
  height:74px;
  margin-top:18px;
  border:none;
  border-radius:18px;
  background:#2ac769;
  color:#fff;
  font-size:24px;
  cursor:pointer;
}

/* 🔒 النص تحت الزر */
.secure-text{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  font-weight:700;
  color:#2f2f33;
  opacity:0.85;
}
</style>
</head>

<body>

<div class="page">

  <div class="amount-title">المبلغ</div>
  <div class="amount-value">SAR 825.00</div>

  <div class="divider">
    <span>ادفع عن طريق البطاقة</span>
  </div>

  <div class="field-group">
    <label class="label">اسم حامل البطاقة</label>
    <input class="input" placeholder="اسم حامل البطاقة">
  </div>

  <div class="field-group">

    <div class="card-head">
      <label class="label">معلومات البطاقة</label>

      <div class="card-logo-top">
        <img src="https://i.postimg.cc/m2ZRQFrt/20260417-171946.png">
      </div>
    </div>

    <input class="input card-number" placeholder="0000 0000 0000 0000">

    <div class="row">
      <div class="col">
        <input class="input small-input" placeholder="CVV">
      </div>
      <div class="col">
        <input class="input small-input" placeholder="MM/YY">
      </div>
    </div>

  </div>

  <button class="pay-btn">ادفع SAR 825.00</button>

  <div class="secure-text">
    🔒 دفع آمن ومشفّر 100%
  </div>

</div>

</body>
  </html>
